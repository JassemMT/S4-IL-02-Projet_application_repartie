<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carte de Nancy</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin: 0;
            padding: 14px;
            text-align: center;
        }

        #message {
            padding: 8px;
            text-align: center;
        }

        #map {
            height: calc(100vh - 100px);
            width: 100%;
        }
        /*  styles marqueurs  */
        .custom-div-icon {
            background: transparent;
            width: 44px; 
            height: 60px; 
            display: inline-block;
        }

        .custom-div-icon .marker-pin {
            width: 40px;
            height: 40px;
            background: white; 
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transform: rotate(-45deg);
            border-radius: 20px 20px 20px 0;
            box-shadow: 0 3px 8px rgba(0,0,0,0.16);
            border: 1px solid rgba(0,0,0,0.08);
        }

        .custom-div-icon .marker-dot {
            width: 26px; 
            height: 26px; 
            background: #277d4a; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
            overflow: hidden;
        }

        .custom-div-icon .marker-dot svg {
            width: 22px; 
            height: 22px;
            display: block;
            transform: rotate(45deg);
            transform-origin: center;
        }

        
        .custom-div-icon {
            width: 50px;
            height: 50px;
            display: inline-block;
            
        }
    </style>
</head>

<body>
    <h1>Stations VélOstan'lib à Nancy</h1>

    <div id="message">
        Chargement des stations...
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- config.js doit être chargé avant app.js -->
    <script src="dist/app.js"></script>
</body>
</html>
