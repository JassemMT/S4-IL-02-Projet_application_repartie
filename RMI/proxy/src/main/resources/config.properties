# Connexion au service RMI
rmi.host=localhost
rmi.port=1099
rmi.name=serviceRestaurant

# Port d'écoute du proxy HTTP
http.port=8080

# URL de l'API open data Grand Nancy pour les incidents de circulation
# Adapter le nom du dataset si nécessaire (cf. opendata.grandnancy.eu)
incidents.url=https://opendata.grandnancy.eu/api/explore/v2.1/catalog/datasets/travaux-et-chantiers-metropole-du-grand-nancy/records?limit=100

# Proxy IUT pour accéder à Internet depuis les machines de l'IUT
# Laisser vide si non nécessaire (ex: en dehors de l'IUT)
iut.proxy.host=
iut.proxy.port=
